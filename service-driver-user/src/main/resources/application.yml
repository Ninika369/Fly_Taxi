spring:
  application:
    name: service-driver-user
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: "${SERVICE_DRIVER_USER_DB_URL:jdbc:mysql://localhost:3306/service-driver-user?characterEncoding=utf-8&serverTimezone=GMT%2B8}"
    username: "${SERVICE_DRIVER_USER_DB_USERNAME:${DB_USERNAME:root}}"
    password: "${SERVICE_DRIVER_USER_DB_PASSWORD:${DB_PASSWORD:}}"
  cloud:
    nacos:
      discovery:
        server-addr: "${NACOS_SERVER_ADDR:localhost:8848}"
        username: "${NACOS_USERNAME:nacos}"
        password: "${NACOS_PASSWORD:}"

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath:mapper/*.xml



server:
  port: 8086
