spring:
  application:
    name: service-order
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: "${SERVICE_ORDER_DB_URL:jdbc:mysql://localhost:3306/service-order?characterEncoding=utf-8&serverTimezone=GMT%2B8}"
    username: "${SERVICE_ORDER_DB_USERNAME:${DB_USERNAME:root}}"
    password: "${SERVICE_ORDER_DB_PASSWORD:${DB_PASSWORD:}}"
  cloud:
    nacos:
      discovery:
        server-addr: "${NACOS_SERVER_ADDR:localhost:8848}"
        username: "${NACOS_USERNAME:nacos}"
        password: "${NACOS_PASSWORD:}"
  redis:
    port: "${REDIS_PORT:6379}"
    host: "${REDIS_HOST:localhost}"
    database: "${REDIS_DATABASE:0}"


amap:
  key: "${AMAP_KEY:}"
  sid: "${AMAP_SID:}"

---
spring:
  profiles: 8089
server:
  port: 8089
---
spring:
  profiles: 8090
server:
  port: 8090
