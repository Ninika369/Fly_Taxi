server:
  port: 8083

spring:
  application:
    name: service-passenger-user
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: "${SERVICE_PASSENGER_USER_DB_URL:jdbc:mysql://localhost:3306/service-passenger-user?characterEncoding=utf-8&serverTimezone=GMT%2B8}"
    username: "${SERVICE_PASSENGER_USER_DB_USERNAME:${DB_USERNAME:root}}"
    password: "${SERVICE_PASSENGER_USER_DB_PASSWORD:${DB_PASSWORD:}}"
  cloud:
    nacos:
      discovery:
        server-addr: "${NACOS_SERVER_ADDR:localhost:8848}"
        username: "${NACOS_USERNAME:nacos}"
        password: "${NACOS_PASSWORD:}"
